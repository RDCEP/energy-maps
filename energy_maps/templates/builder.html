{% extends 'base.html' %} {% block main %}

<!-- Map Builder UI -->
<div> 
  <div id="asset-totals"><p>Asset Totals:</p></div>
  
</div>
<!--/ Map Builder UI -->

<div class="map wrapper">
  <div class="main map builder">
    <div id="spinner" style="display: none;">
      <img id="spinner" src="../static/images/spinner.gif" alt="loading" />
    </div>
  </div>
  <div class="map composite"></div>
  <p>Create a custom map:</p>
  <div class="options">
    <!-- Checkboxes render here -->
  </div>
  <span>
    <!-- <span id="">Asset Totals:</span> -->
    <a id="download" download="custom-map.png">
      <button type="button" onClick="download()">Download</button>
    </a>
  </span>
  <!-- Layer divs render here -->
  <footer>
    <img class="master-legend" src="../static/images/master-legend.png"/>
  </footer>
</div>

{% endblock %} {% block bodyjs %}

<script>
  let SCALE = {{ scale }};
</script>

{% assets 'js_d3' %}

<script src="{{ ASSET_URL }}"></script>

{% endassets %}

{% assets 'js_numeral' %}

<script src="{{ ASSET_URL }}"></script>

{% endassets %}

<script src="https://unpkg.com/topojson-client@3"></script>

{% assets 'js_bigfucker' %}

<script src="{{ ASSET_URL }}"></script>

{% endassets %}

<script>
  function download() {
    let download = document.getElementById("download");
    let image = document
      .getElementById("mapcanvas")
      .toDataURL("image/png")
      .replace("image/png", "image/octet-stream");
    download.setAttribute("href", image);
  }
</script>

{% endblock %}
